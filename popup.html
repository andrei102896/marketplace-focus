<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="extension.css">
</head>
<body class="popup-page">
<div class="popup-shell">
    <header class="popup-head">
        <h2 data-i18n="popupTitle">Focus Mode</h2>
        <p class="subtitle" data-i18n="popupSubtitle">Reels blocker with pause, lock, and schedule</p>
    </header>

    <section class="popup-card">
        <div class="popup-row">
            <span class="label-text" data-i18n="popupBlockReelsLabel">Block Reels</span>
            <label class="switch">
                <input type="checkbox" id="toggle">
                <span class="slider"></span>
            </label>
        </div>
    </section>

    <section class="popup-card">
        <button id="pause-action" class="button button-secondary" type="button" data-i18n="popupLoading">Loading...</button>
        <p id="pause-status" data-i18n="popupLoading">Loading...</p>
    </section>

    <footer class="popup-footer">
        <button type="button" id="open-options" data-i18n="popupSettings">Settings</button>
        <a href="https://chrome.google.com/webstore/detail/lchgjnkonkmccfpjjmnkbegibdgjocog/reviews" target="_blank" rel="noopener noreferrer" data-i18n="popupRate">Rate</a>
        <a href="https://www.buymeacoffee.com/marketplacefocus" target="_blank" rel="noopener noreferrer" data-i18n="popupSupport">Support</a>
    </footer>
</div>

<script src="popup.js"></script>
</body>
</html>
